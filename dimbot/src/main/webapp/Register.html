<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dimbot</title>
    <link rel="icon" href="https://i.ibb.co/PGKcsTyZ/dd.png">
    <link rel="stylesheet" href="design.css">
</head>

<body>
    <div class="wrapper">
        <form action="RegisterServlet" method="POST">
            <div class="imgdim">
                <img src="https://i.ibb.co/PGKcsTyZ/dd.png" alt="" class="user-icon">
            </div>
            <h1>Register</h1>
            <div class="input-box">
                <input aria-label="user-input" type="text" id="username" name="username" placeholder="Username"
                    maxlength="12" required>
                <small id="usernameMsg"></small>
            </div>

            <div class="input-box">
                <input aria-label="password-input" type="password" id="password" name="password" placeholder="Password"
                    required>
            </div>

            <div class="input-box">
                <input aria-label="mail-input" type="email" id="email" name="email" placeholder="E-mail" required>
            </div>

            <button type="submit" value="submit" class="btn">Register</button>
            <p>Back to : <a href="welcome.html" style="text-decoration: none; color: skyblue;">Home</a>  or  <a href="Login.jsp" style="text-decoration: none; color: skyblue;">Login</a></p>
        </form>
    </div>
    <script>
        const usernameInput = document.getElementById("username");
        const usernameMsg = document.getElementById("usernameMsg");

        usernameInput.addEventListener("keyup", function () {

            const username = this.value.trim();

            if (username.length < 3) {
                usernameMsg.innerHTML = "";
                return;
            }

            fetch("CheckUsernameServlet?username=" +
                encodeURIComponent(username))
                .then(response => response.text())
                .then(data => {

                    if (data === "exists") {
                        usernameMsg.innerHTML = "Username already taken";
                        usernameMsg.style.color = "red";
                    } else if (data === "available") {
                        usernameMsg.innerHTML = "Username available";
                        usernameMsg.style.color = "green";
                    }
                });
        });
    </script>
</body>

</html>
